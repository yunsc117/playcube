<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090d;
  --panel:#0c0f15;
  --border:#1a2030;
  --text:#b8ccd8;
  --muted:#3d5468;
  --accent:#f97316;
  --accent2:#fbbf24;
  --green:#22c55e;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  display:flex;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
#viewport{
  flex:1;
  position:relative;
  min-width:0;
  min-height:0;
}
/* Radial vignette over the canvas */
#viewport::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(7,9,13,.65) 100%);
  pointer-events:none;
}
canvas{
  display:block;
  width:100%;
  height:100%;
  cursor:grab;
  touch-action:none;
}
canvas.grabbing{cursor:grabbing}
canvas.can-move{cursor:pointer}

/* Swipe hint fade-in/out */
#hint-overlay{
  position:absolute;
  bottom:22px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:.14em;
  color:rgba(184,204,216,.35);
  pointer-events:none;
  white-space:nowrap;
  transition:opacity .4s;
}

/* ── Sidebar ── */
#sidebar{
  width:218px;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:22px 14px;
  gap:20px;
  overflow-y:auto;
  overflow-x:hidden;
  flex-shrink:0;
}
#sidebar-header{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.logo{
  font-size:15px;
  font-weight:700;
  color:var(--accent);
  letter-spacing:.14em;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}
.logo-sub{color:var(--muted);font-weight:300;font-size:11px;letter-spacing:.1em}
.stats{display:flex;flex-direction:column}
.stat{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:7px 0;
  border-bottom:1px solid var(--border);
}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase}
.stat-value{
  font-size:24px;
  font-weight:700;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  transition:color .3s;
}
#timer.running{color:var(--accent)}

/* Win */
#win-msg{
  display:none;
  padding:10px 0;
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:.14em;
  color:var(--green);
  border:1px solid var(--green);
  background:rgba(34,197,94,.06);
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.sec-label{
  font-size:9px;
  color:var(--muted);
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:8px;
}

/* Move grid */
.move-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:3px;
}
.btn{
  background:#111720;
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:700;
  padding:8px 0;
  cursor:pointer;
  transition:background .1s,color .08s,border-color .1s;
  letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:var(--accent);border-color:var(--accent);color:#000}
.btn:active{background:var(--accent2);border-color:var(--accent2);color:#000;transform:scale(.92)}

/* Action buttons */
.action-wrap{display:flex;flex-direction:column;gap:6px}
.abtn{
  width:100%;
  padding:11px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:.12em;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.abtn:hover{border-color:var(--accent);color:var(--accent)}
.abtn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.abtn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.abtn:active{transform:scale(.97)}

/* Hint / legend */
.hint{font-size:9px;color:var(--muted);line-height:2.1}
.hint b{color:var(--text);font-weight:400}
.legend{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.litem{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.spacer{flex:1}
.privacy-link{
  display:block;
  font-size:9px;
  color:var(--muted);
  text-decoration:none;
  letter-spacing:.1em;
  text-align:center;
  padding:4px 0 2px;
  transition:color .15s;
}
.privacy-link:hover{color:var(--text)}

/* ── Mobile portrait ── */
@media (max-width:640px){
  body{flex-direction:column}
  #viewport{flex:1;min-height:0}
  #sidebar{
    width:100%;
    border-left:none;
    border-top:1px solid var(--border);
    padding:10px 12px 12px;
    gap:8px;
  }
  #sidebar-header{
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .logo{font-size:12px;letter-spacing:.1em}
  .logo-sub{display:none}
  .stats{flex-direction:row;gap:14px}
  .stat{flex-direction:column;align-items:flex-end;padding:0;border-bottom:none}
  .stat-label{font-size:8px}
  .stat-value{font-size:18px}
  #win-msg{padding:6px 0;font-size:10px}
  .btn{padding:13px 0;font-size:14px;min-height:46px}
  .move-grid{gap:4px}
  .action-wrap{flex-direction:row}
  .abtn{padding:13px 8px;font-size:11px;min-height:46px}
  .desktop-only,.spacer{display:none}
  .sec-label{display:none}
  #hint-overlay{display:none}
}

/* ── Mobile landscape ── */
@media (max-height:500px) and (orientation:landscape){
  #sidebar{width:180px;padding:12px 10px;gap:10px}
  #sidebar-header{gap:10px}
  .stat-value{font-size:18px}
  .btn{padding:9px 0;font-size:12px}
  .abtn{padding:9px}
  .desktop-only,.spacer{display:none}
  .sec-label{display:none}
}
</style>

<body>

<div id="viewport">
  <canvas id="c"></canvas>

<div id="sidebar">

      <div class="litem"><div class="ldot" style="background:#ff8800"></div>L</div>
      <div class="litem"><div class="ldot" style="background:#e63023"></div>R</div>
      <div class="litem"><div class="ldot" style="background:#1ba04e"></div>F</div>
      <div class="litem"><div class="ldot" style="background:#1b40b5"></div>B</div>

  <div class="desktop-only">

    <div class="hint">
      <b>Swipe face</b> — rotate layer<br>
      <b>2-finger drag</b> — rotate view<br>
      <b>Drag space</b> — rotate view<br>
      <b>U D L R F B</b> — clockwise<br>
      <b>Shift</b> + key — counter-CW
    </div>

  <div class="spacer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ── Scene ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const vp     = document.getElementById('viewport');
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x07090d);
scene.fog = new THREE.FogExp2(0x07090d, 0.012);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

function resize() {
  const w = vp.clientWidth, h = vp.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Lighting ───────────────────────────────────────────────────────────
// Warm key light (upper-front-right)
const key = new THREE.DirectionalLight(0xfff8f0, 1.4);
key.position.set(4, 6, 5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 20;
key.shadow.camera.left = key.shadow.camera.bottom = -4;
key.shadow.camera.right = key.shadow.camera.top = 4;
key.shadow.bias = -0.001;
scene.add(key);

// Cool fill light (lower-back-left)
const fill = new THREE.DirectionalLight(0xa8c8ff, 0.4);
fill.position.set(-4, -2, -4);
scene.add(fill);

// Subtle rim light (back-right)
const rim = new THREE.DirectionalLight(0xffffff, 0.25);
rim.position.set(3, 1, -5);
scene.add(rim);

// Ambient
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// Ground platform
const groundGeo = new THREE.CircleGeometry(2.8, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0c1018,
  roughness: 0.9,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.0;
ground.receiveShadow = true;
scene.add(ground);

// ── Camera orbit ───────────────────────────────────────────────────────
let theta = 0.65, phi = 1.08, CAM_R = 6.8;

function updateCam() {
  camera.position.set(
    CAM_R * Math.sin(phi) * Math.sin(theta),
    CAM_R * Math.cos(phi),
    CAM_R * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}
updateCam();

// ── Colors & materials ─────────────────────────────────────────────────
// BoxGeometry face order: +x, -x, +y, -y, +z, -z
const COL = {
  R: 0xe8251a, // red
  L: 0xff8c00, // orange
  U: 0xf5f5f5, // white
  D: 0xffd600, // yellow
  F: 0x16a34a, // green  (brighter)
  B: 0x2563eb, // blue   (brighter)
  I: 0x0a0e13, // inner plastic
};

// Phong face normals (for win detection)
const FACE_NORMALS = [
  new THREE.Vector3( 1, 0, 0),
  new THREE.Vector3(-1, 0, 0),
  new THREE.Vector3( 0, 1, 0),
  new THREE.Vector3( 0,-1, 0),
  new THREE.Vector3( 0, 0, 1),
  new THREE.Vector3( 0, 0,-1),
];

function makeMat(color, isInner) {
  return new THREE.MeshPhongMaterial({
    color,
    shininess:           isInner ? 8  : 110,
    specular:            isInner ? 0x040404 : 0x282828,
    polygonOffset:       !isInner,
    polygonOffsetFactor: -1,
    polygonOffsetUnits:  -1,
  });
}

// ── Cubelets ───────────────────────────────────────────────────────────
const cubelets  = [];
const BODY_GEO  = new THREE.BoxGeometry(0.915, 0.915, 0.915);

// Sticker planes (inset colored quads) per colored face — creates the classic look
const STICKER_GEO = new THREE.PlaneGeometry(0.76, 0.76);
const STICKER_OFF = 0.463; // just past the body face (0.915/2 = 0.4575)

const STICKER_ROTS = [
  [0,  Math.PI/2, 0],  // +x
  [0, -Math.PI/2, 0],  // -x
  [-Math.PI/2, 0, 0],  // +y
  [ Math.PI/2, 0, 0],  // -y
  [0, 0, 0],           // +z
  [0, Math.PI, 0],     // -z
];
const STICKER_DIRS = [
  new THREE.Vector3( 1, 0, 0),
  new THREE.Vector3(-1, 0, 0),
  new THREE.Vector3( 0, 1, 0),
  new THREE.Vector3( 0,-1, 0),
  new THREE.Vector3( 0, 0, 1),
  new THREE.Vector3( 0, 0,-1),
];

function makeCubelet(x, y, z) {
  const faceColors = [
    x === 1  ? COL.R : null,
    x === -1 ? COL.L : null,
    y === 1  ? COL.U : null,
    y === -1 ? COL.D : null,
    z === 1  ? COL.F : null,
    z === -1 ? COL.B : null,
  ];

  // Body: dark plastic
  const body = new THREE.Mesh(
    BODY_GEO,
    new THREE.MeshPhongMaterial({ color: COL.I, shininess: 12, specular: 0x080808 })
  );
  body.position.set(x, y, z);
  body.castShadow = true;
  body.receiveShadow = true;

  // Store face colors on body for win detection
  body.userData.faceColors = faceColors;

  // Sticker planes on each colored face
  for (let i = 0; i < 6; i++) {
    if (!faceColors[i]) continue;
    const [rx, ry, rz] = STICKER_ROTS[i];
    const dir = STICKER_DIRS[i];
    const mat = makeMat(faceColors[i], false);
    const sticker = new THREE.Mesh(STICKER_GEO, mat);
    sticker.position.copy(dir.clone().multiplyScalar(STICKER_OFF));
    sticker.rotation.set(rx, ry, rz);
    sticker.userData.faceIndex = i; // which face this sticker is on
    sticker.userData.isSticker = true;
    body.add(sticker);
  }

  scene.add(body);
  cubelets.push(body);
}

function buildCube() {
  cubelets.forEach(c => scene.remove(c));
  cubelets.length = 0;
  for (let x = -1; x <= 1; x++)
    for (let y = -1; y <= 1; y++)
      for (let z = -1; z <= 1; z++)
        if (x || y || z) makeCubelet(x, y, z);
}

buildCube();

// ── Moves ──────────────────────────────────────────────────────────────
const MOVES = {
  'U' : { a:'y', l: 1, s:-1 },
  "U'": { a:'y', l: 1, s: 1 },
  'D' : { a:'y', l:-1, s: 1 },
  "D'": { a:'y', l:-1, s:-1 },
  'R' : { a:'x', l: 1, s:-1 },
  "R'": { a:'x', l: 1, s: 1 },
  'L' : { a:'x', l:-1, s: 1 },
  "L'": { a:'x', l:-1, s:-1 },
  'F' : { a:'z', l: 1, s:-1 },
  "F'": { a:'z', l: 1, s: 1 },
  'B' : { a:'z', l:-1, s: 1 },
  "B'": { a:'z', l:-1, s:-1 },
};
const MOVE_KEYS = Object.keys(MOVES);

const queue     = [];
let animating   = false;
let scrambling  = false;

function execMove(name, instant) {
  const { a, l, s } = MOVES[name];
  const angle  = s * Math.PI / 2;
  const layer  = cubelets.filter(c => Math.round(c.position[a]) === l);

  const pivot = new THREE.Group();
  scene.add(pivot);
  layer.forEach(c => pivot.attach(c));

  function finish() {
    pivot.rotation[a] = angle;
    pivot.updateMatrixWorld();
    layer.forEach(c => {
      scene.attach(c);
      c.position.x = Math.round(c.position.x);
      c.position.y = Math.round(c.position.y);
      c.position.z = Math.round(c.position.z);
    });
    scene.remove(pivot);
    if (!instant) { animating = false; processQueue(); checkWin(); }
  }

  if (instant) { finish(); return; }

  const DUR = 160;
  const t0  = performance.now();
  (function frame(now) {
    const p = Math.min((now - t0) / DUR, 1);
    const e = p < .5 ? 2*p*p : -1+(4-2*p)*p;
    pivot.rotation[a] = angle * e;
    p < 1 ? requestAnimationFrame(frame) : finish();
  })(t0);
}

function processQueue() {
  if (animating || queue.length === 0) return;
  const name = queue.shift();
  animating = true;
  if (!scrambling) {
    if (!timerStarted) startTimer();
    moveCount++;
    document.getElementById('moves').textContent = moveCount;
  }
  execMove(name, false);
}

function queueMove(name) {
  if (queue.length >= 10) return;
  queue.push(name);
  if (!animating) processQueue();
}

// ── Raycasting + swipe to move ─────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const ndcPt     = new THREE.Vector2();

function hitTest(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  ndcPt.x = (clientX - r.left) / r.width  *  2 - 1;
  ndcPt.y = (clientY - r.top)  / r.height * -2 + 1;
  raycaster.setFromCamera(ndcPt, camera);

  // Check cubelets AND their sticker children
  const hits = raycaster.intersectObjects(cubelets, true);
  if (!hits.length) return null;

  const h = hits[0];
  // Resolve cubelet (body) from sticker child
  const cubelet = h.object.userData.isSticker ? h.object.parent : h.object;

  // World-space face normal
  const wn = h.face.normal.clone().transformDirection(h.object.matrixWorld);
  // Snap to nearest axis
  const ax = Math.abs(wn.x), ay = Math.abs(wn.y), az = Math.abs(wn.z);
  if (ax >= ay && ax >= az)      wn.set(Math.sign(wn.x), 0, 0);
  else if (ay >= ax && ay >= az) wn.set(0, Math.sign(wn.y), 0);
  else                           wn.set(0, 0, Math.sign(wn.z));

  return { cubelet, faceNormal: wn };
}

// Maps screen drag (dx,dy) + face context → move name
const _right = new THREE.Vector3();
const _up    = new THREE.Vector3();
const _drag  = new THREE.Vector3();
const _rv    = new THREE.Vector3();

function screenDragToMove(dx, dy, cubelet, faceNormal) {
  _right.setFromMatrixColumn(camera.matrixWorld, 0);
  _up.setFromMatrixColumn(camera.matrixWorld, 1);

  // World drag direction (screen dy inverted)
  _drag.copy(_right).multiplyScalar(dx).addScaledVector(_up, -dy).normalize();

  // Project onto face plane
  _drag.addScaledVector(faceNormal, -_drag.dot(faceNormal));
  if (_drag.lengthSq() < 1e-6) return null;
  _drag.normalize();

  // Rotation axis = cross(faceNormal, drag)
  _rv.crossVectors(faceNormal, _drag);

  // Snap to nearest axis
  const ax = Math.abs(_rv.x), ay = Math.abs(_rv.y), az = Math.abs(_rv.z);
  let rotAxis, rotSign;
  if (ax >= ay && ax >= az)      { rotAxis = 'x'; rotSign = Math.sign(_rv.x); }
  else if (ay >= ax && ay >= az) { rotAxis = 'y'; rotSign = Math.sign(_rv.y); }
  else                           { rotAxis = 'z'; rotSign = Math.sign(_rv.z); }

  const layer = Math.round(cubelet.position[rotAxis]);

  for (const [name, def] of Object.entries(MOVES)) {
    if (def.a === rotAxis && def.l === layer && def.s === rotSign) return name;
  }
  return null;
}

// ── Pointer events (mouse + unified touch, multi-touch orbit) ──────────
const DRAG_MIN = 10; // px before committing to a move

// Track all active pointers for multi-touch detection
const ptrs = new Map(); // pointerId -> {x, y}
let pState = null;      // current gesture state
let multiOrbitLast = null; // centroid during 2-finger orbit

function ptCentroid() {
  let x = 0, y = 0;
  ptrs.forEach(p => { x += p.x; y += p.y; });
  return { x: x / ptrs.size, y: y / ptrs.size };
}

canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0 && e.pointerType === 'mouse') return;
  canvas.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (ptrs.size >= 2) {
    // Second (or more) finger: cancel any pending drag, switch to 2-finger orbit
    pState = null;
    multiOrbitLast = ptCentroid();
    return;
  }

  // First pointer
  multiOrbitLast = null;
  const hit = hitTest(e.clientX, e.clientY);
  if (hit && !animating) {
    pState = { type: 'drag', startX: e.clientX, startY: e.clientY, multiTouched: false, ...hit };
  } else {
    pState = { type: 'orbit', lastX: e.clientX, lastY: e.clientY };
    canvas.classList.add('grabbing');
  }
});

canvas.addEventListener('pointermove', e => {
  if (ptrs.has(e.pointerId)) ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });

  // 2-finger orbit: use centroid movement
  if (ptrs.size >= 2 && multiOrbitLast) {
    const c = ptCentroid();
    theta -= (c.x - multiOrbitLast.x) * 0.007;
    phi    = Math.max(0.15, Math.min(Math.PI - 0.15, phi - (c.y - multiOrbitLast.y) * 0.007));
    multiOrbitLast = c;
    updateCam();
    return;
  }

  if (!pState) {
    // Desktop hover: update cursor
    if (e.pointerType === 'mouse') {
      canvas.classList.toggle('can-move', !!hitTest(e.clientX, e.clientY));
    }
    return;
  }
  if (pState.type === 'orbit') {
    theta -= (e.clientX - pState.lastX) * 0.007;
    phi    = Math.max(0.15, Math.min(Math.PI - 0.15, phi - (e.clientY - pState.lastY) * 0.007));
    pState.lastX = e.clientX;
    pState.lastY = e.clientY;
    updateCam();
  }
});

canvas.addEventListener('pointerup', e => {
  const wasDrag = pState?.type === 'drag' && ptrs.size === 1 && !pState.multiTouched;

  ptrs.delete(e.pointerId);

  if (ptrs.size < 2) multiOrbitLast = null;

  if (ptrs.size === 0) {
    if (wasDrag) {
      const dx = e.clientX - pState.startX;
      const dy = e.clientY - pState.startY;
      if (Math.hypot(dx, dy) >= DRAG_MIN && !animating) {
        const move = screenDragToMove(dx, dy, pState.cubelet, pState.faceNormal);
        if (move) queueMove(move);
      }
    }
    pState = null;
    canvas.classList.remove('grabbing');
  }
});

canvas.addEventListener('pointercancel', e => {
  ptrs.delete(e.pointerId);
  if (ptrs.size === 0) {
    pState = null;
    multiOrbitLast = null;
    canvas.classList.remove('grabbing');
  }
});

// ── Win detection ──────────────────────────────────────────────────────
const CHECK_FACES = [
  { d: new THREE.Vector3( 1,0,0), a:'x', v: 1 },
  { d: new THREE.Vector3(-1,0,0), a:'x', v:-1 },
  { d: new THREE.Vector3( 0,1,0), a:'y', v: 1 },
  { d: new THREE.Vector3( 0,-1,0), a:'y', v:-1 },
  { d: new THREE.Vector3( 0,0,1), a:'z', v: 1 },
  { d: new THREE.Vector3( 0,0,-1), a:'z', v:-1 },
];
const _iq = new THREE.Quaternion();
const _ld = new THREE.Vector3();

function stickerColor(cubelet, worldDir) {
  // Find which sticker child faces worldDir
  _iq.copy(cubelet.quaternion).invert();
  _ld.copy(worldDir).applyQuaternion(_iq);
  let best = -Infinity, bestColor = null;

  for (const child of cubelet.children) {
    if (!child.userData.isSticker) continue;
    const fi = child.userData.faceIndex;
    const dot = _ld.dot(FACE_NORMALS[fi]);
    if (dot > best) {
      best = dot;
      bestColor = child.material.color.getHex();
    }
  }
  // Fallback to body (no stickers = inner face — shouldn't be on outer side)
  return bestColor;
}

let gameOver = false;

function checkWin() {
  if (gameOver) return;
  for (const { d, a, v } of CHECK_FACES) {
    const layer = cubelets.filter(c => Math.round(c.position[a]) === v);
    if (layer.length !== 9) return;
    const cols = layer.map(c => stickerColor(c, d));
    if (cols.some(x => x === null)) return;
    if (!cols.every(x => x === cols[0])) return;
  }
  gameOver = true;
  stopTimer();
  document.getElementById('win-msg').style.display = 'block';
  document.getElementById('timer').classList.remove('running');
}

// ── Timer ──────────────────────────────────────────────────────────────
let timerStarted = false, timerStart = 0, timerID = null, moveCount = 0;

function startTimer() {
  timerStarted = true;
  timerStart   = Date.now();
  document.getElementById('timer').classList.add('running');
  timerID = setInterval(() => {
    const s  = Math.floor((Date.now() - timerStart) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${mm}:${ss}`;
  }, 200);
}

function stopTimer() {
  clearInterval(timerID);
  timerID = null;
}

// ── Scramble & reset ───────────────────────────────────────────────────
function inv(m) { return m.endsWith("'") ? m.slice(0,-1) : m+"'"; }

function scramble() {
  reset();
  scrambling = true;
  let last = '';
  for (let i = 0; i < 22; i++) {
    let m;
    do { m = MOVE_KEYS[Math.random() * 12 | 0]; } while (m === inv(last));
    last = m;
    execMove(m, true);
  }
  scrambling = false;
  gameOver   = false;
  document.getElementById('win-msg').style.display = 'none';
}

function reset() {
  queue.length = 0;
  animating = scrambling = timerStarted = gameOver = false;
  moveCount = 0;
  pState = null;
  stopTimer();
  document.getElementById('moves').textContent  = '0';
  document.getElementById('timer').textContent  = '00:00';
  document.getElementById('timer').classList.remove('running');
  document.getElementById('win-msg').style.display = 'none';
  buildCube();
}

// ── Button & keyboard input ────────────────────────────────────────────
document.querySelectorAll('[data-m]').forEach(b => {
  b.addEventListener('click', () => queueMove(b.dataset.m));
});
document.getElementById('btn-scramble').addEventListener('click', scramble);
document.getElementById('btn-reset').addEventListener('click', reset);

document.addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.target !== document.body) return;
  const key = e.key.toUpperCase();
  if ('UDLRFB'.includes(key) && key.length === 1) {
    e.preventDefault();
    queueMove(e.shiftKey ? key + "'" : key);
  }
});

// ── Render loop ────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  renderer.render(scene, camera);
})();
</script>
